services:
  - type: web
    name: second-brain-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_CONNECTION_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: OTP_EXPIRY_MINUTES
        value: 10
      - key: FRONTEND_URL
        fromService:
          type: web
          name: second-brain-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: second-brain-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: second-brain-api
          envVarKey: RENDER_EXTERNAL_URL
